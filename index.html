<!DOCTYPE html>

<title>Documento riservato</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#16181d;color:#fff;min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:#1f2228;border:1px solid #33373f;border-radius:20px;padding:38px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lk{font-size:40px}
h1{font-size:20px;font-weight:800;margin:14px 0 4px;letter-spacing:-.01em}
p{color:#9aa0a6;font-size:13.5px;margin-bottom:22px}
input{width:100%;background:#16181d;border:1px solid #3a3f48;border-radius:11px;padding:13px 15px;color:#fff;font-size:15px;text-align:center;letter-spacing:.05em;outline:none}
input:focus{border-color:#C81E1E}
button{width:100%;margin-top:12px;background:#C81E1E;color:#fff;border:0;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
button:hover{background:#9B1414}
.err{color:#f87171;font-size:13px;margin-top:14px;min-height:18px}
.brand{margin-top:20px;color:#6b7280;font-size:12px}
</style></head>
<body>
<div class="card">
  <div class="lk">🔒</div>
  <h1>Documento riservato</h1>
  <p>Inserisci la password per visualizzare il documento.</p>
  <input id="pw" type="password" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Apri</button>
  <div class="err" id="err"></div>
  <div class="brand">🔒 Accesso protetto</div>
</div>
